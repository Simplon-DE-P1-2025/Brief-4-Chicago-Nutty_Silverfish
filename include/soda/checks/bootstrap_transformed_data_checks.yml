# Controles qualite sur les donnees transformees du bootstrap
checks for chicago_crimes_transformed_bootstrap_staging:
  - row_count > 0:
      name: La table transformee bootstrap contient des donnees

  - missing_count(id) = 0:
      name: Aucun ID manquant apres transformation

  - missing_count(crime_date) = 0:
      name: Aucune date manquante apres transformation

  - missing_count(latitude) = 0:
      name: Aucune latitude manquante

  - duplicate_count(id) = 0:
      name: Les IDs bootstrap restent uniques apres transformation

  - min(latitude) >= 41.6:
      name: Latitude minimale dans les limites de Chicago

  - max(latitude) <= 42.1:
      name: Latitude maximale dans les limites de Chicago

  - min(longitude) >= -87.95:
      name: Longitude minimale dans les limites de Chicago

  - max(longitude) <= -87.5:
      name: Longitude maximale dans les limites de Chicago

  - failed rows:
      name: Aucune date dans le futur
      fail query: |
        SELECT id, crime_date
        FROM chicago_crimes_transformed_bootstrap_staging
        WHERE crime_date > NOW()
