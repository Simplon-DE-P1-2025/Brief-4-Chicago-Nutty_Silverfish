# Les placeholders ${POSTGRES_*} sont remplis a l'execution par
# `run_soda_scan()` a partir de la connexion Airflow `chicago_crimes_db`.
data_source chicago_crimes:
  type: postgres
  connection:
    host: ${POSTGRES_HOST}
    port: ${POSTGRES_PORT}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    database: ${POSTGRES_DB}
    schema: public
